    tailwind.config = {
      theme: {

  <style>
    :root {
      --silver: #C0C0C0;
      --dark-steel: #4A5568;
      --acid-lime: #CCFF00;
      --hot-pink: #FF0099;
      --electric-blue: #0033CC;
    }
    * { -webkit-tap-highlight-color: transparent; }
    html { overscroll-behavior: none; }
    body {
      background-color: #C0C0C0;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"),

      font-family: 'RoundedFixedsys', Fixedsys, Consolas, monospace;
      font-weight: normal;
      max-width: 450px;
      margin: 0 auto;
      min-height: 100dvh;
      text-shadow: 0 0 1px rgba(0,0,0,0.3);
    }
    .chrome-molding {
      border: 2px solid #000;
      box-shadow: inset 1px 1px 0 rgba(255,255,255,0.8), inset -1px -1px 0 rgba(0,0,0,0.5);
    }
    .chrome-molding-outer {
      border: 2px solid #000;
      box-shadow: inset 1px 1px 0 rgba(255,255,255,0.8), inset -1px -1px 0 rgba(0,0,0,0.5), 2px 2px 0 #000;
    }
    .metal-plate {
      background: linear-gradient(145deg, #b8b8b8 0%, #C0C0C0 30%, #a0a0a0 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
    }
    .metal-engraved {
      background: linear-gradient(145deg, #606870 0%, #4A5568 50%, #3d4652 100%);
      color: #b0b0b0;
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.4);
    }
    .metal-magnet {
      background: linear-gradient(145deg, #d0d0d0 0%, #C0C0C0 50%, #a0a0a0 100%);
      box-shadow: inset 1px 1px 0 rgba(255,255,255,0.6), 2px 2px 0 rgba(0,0,0,0.4);
    }
    .neon-lime {
      background: #CCFF00;
      color: #000;
      border: 2px solid #000;
      box-shadow: 0 0 0 2px #000, 2px 2px 0 #000;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
    }
    .neon-pink {
      background: #FF0099;
      color: #fff;
      border: 2px solid #000;
      box-shadow: 0 0 0 2px #000;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
    }
    .neon-lime-text { color: #CCFF00; text-shadow: 0 0 0 2px #000, 0 0 0 3px #000, 0 1px 2px #000; }
    .body-weather-tape {
      background: repeating-linear-gradient(-45deg, #FF0099 0px, #FF0099 6px, #000 6px, #000 12px);
      border: 2px solid #000;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2), 2px 2px 0 #000;
    }
    .period-day-pink { background: #FF0099; color: #fff; border: 2px solid #000; box-shadow: 2px 2px 0 #000; }
    .period-phase-pms { background: #00CCFF; color: #000; }
    .period-phase-golden { background: #CCFF00; color: #000; }
    .calendar-board {
      background: linear-gradient(160deg, #c8c8c8 0%, #C0C0C0 40%, #a8a8a8 100%);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.15), 3px 3px 0 #000;
    }
    .sticker-vinyl {
      background: linear-gradient(145deg, #e8ff9e 0%, #CCFF00 50%, #aacc00 100%);
      border: 2px solid #000;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.5), 2px 2px 0 #000;
      filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.4));
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .steel-beam {
      background: linear-gradient(180deg, #8a8a8a 0%, #6a6a6a 50%, #5a5a5a 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 -2px 4px rgba(0,0,0,0.3);
    }
    .btn-mechanical {
      transition: transform 0.05s ease, box-shadow 0.05s ease;
    }
    .btn-mechanical:active, .tab-btn[data-active="true"].btn-mechanical {
      transform: translateY(2px);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
    }
    .tab-btn[data-active="true"] { font-weight: 900; background: #CCFF00 !important; border-color: #000; box-shadow: inset 1px 1px 0 rgba(255,255,255,0.5), 2px 2px 0 #000; }
    @keyframes swing { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
    .keyring-swing { animation: swing 2s ease-in-out infinite; }
    @keyframes bin-rise { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-bin-rise { animation: bin-rise 0.4s ease-out forwards; }
    @keyframes paper-suck { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(60vh) scale(0.1); opacity: 0; } }
    .animate-paper-suck { animation: paper-suck 0.5s ease-in forwards; }

    body.dump-modal-open #tabBar { visibility: hidden; pointer-events: none; }
    .sticker-hologram { filter: drop-shadow(0 0 6px rgba(204,255,0,0.9)) drop-shadow(0 0 0 1px #000); }

    .calendar-header-date { font-family: 'Mulmaru', 'Maru Buri', serif; font-weight: normal; letter-spacing: 0.05em; }
    .calendar-schedule-label { font-family: 'Tangba', sans-serif; font-size: 10px; font-weight: normal; line-height: 1.25; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; display: block; letter-spacing: 0.02em; transform: scale(0.5); transform-origin: left center; }

  <script>
(function() {
  const KEYS = { data: 'remind_data', tags: 'remind_tags', stats: 'user_stats', archivePositions: 'remind_archive_positions' };
  let remindData = JSON.parse(localStorage.getItem(KEYS.data) || '{}');
  let remindTags = JSON.parse(localStorage.getItem(KEYS.tags) || '{}');
  let userStats = JSON.parse(localStorage.getItem(KEYS.stats) || '{}');
  let archivePositions = {};
  try { archivePositions = JSON.parse(localStorage.getItem(KEYS.archivePositions) || '{}'); } catch(e) {}

  function save() {
    localStorage.setItem(KEYS.data, JSON.stringify(remindData));
    localStorage.setItem(KEYS.tags, JSON.stringify(remindTags));
    localStorage.setItem(KEYS.stats, JSON.stringify(userStats));
  }
  function saveArchivePositions() {
    localStorage.setItem(KEYS.archivePositions, JSON.stringify(archivePositions));
  }

  function formatDate(d) {
    const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  function getMonthDays(y, mo) {
    const first = new Date(y, mo, 1), last = new Date(y, mo + 1, 0);
    let dow = first.getDay(); if (dow === 0) dow = 7;
    const pad = dow - 1;
    const days = [];
    for (let i = 0; i < pad; i++) days.push(null);
    for (let d = 1; d <= last.getDate(); d++) days.push(d);
    return days;
  }
  function ensureDate(dateStr) {
    if (!remindData[dateStr]) remindData[dateStr] = { diary: [], schedule: [], socialScore: {} };
    return remindData[dateStr];
  }
  function parseTime(text) {
    const m = text.match(/(\d{1,2}):(\d{2})|(\d{1,2})시/);
    if (m) {
      if (m[1] != null) return m[1].padStart(2,'0') + ':' + m[2];
      return m[3].padStart(2,'0') + ':00';
    }
    return null;
  }
  function parseDateInText(text) {
    const now = new Date();
    const y = now.getFullYear();
    const m1 = text.match(/(\d{1,2})\/(\d{1,2})(?:일)?/);
    if (m1) {
      const mo = parseInt(m1[1], 10), day = parseInt(m1[2], 10);
      if (mo >= 1 && mo <= 12 && day >= 1 && day <= 31) return `${y}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }
    const m2 = text.match(/(\d{1,2})-(\d{1,2})(?:일)?/);
    if (m2) {
      const mo = parseInt(m2[1], 10), day = parseInt(m2[2], 10);
      if (mo >= 1 && mo <= 12 && day >= 1 && day <= 31) return `${y}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }
    const m3 = text.match(/(\d{1,2})\.(\d{1,2})(?:일)?/);
    if (m3) {
      const mo = parseInt(m3[1], 10), day = parseInt(m3[2], 10);
      if (mo >= 1 && mo <= 12 && day >= 1 && day <= 31) return `${y}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }
    return null;
  }
  function stripDateAndTimeFromText(text) {
    return text
      .replace(/(\d{1,2})\/(\d{1,2})(?:일)?/g, '')
      .replace(/(\d{1,2})-(\d{1,2})(?:일)?/g, '')
      .replace(/(\d{1,2})\.(\d{1,2})(?:일)?/g, '')
      .replace(/\d{1,2}:\d{2}|\d{1,2}시/g, '')
      .replace(/#[\w가-힣]+/g, '')
      .replace(/\s+/g, ' ')
      .trim() || '일정';
  }
  function extractTags(text) {

  function getPhotoDateStr(file) {
    return new Promise((resolve) => {
      const fallback = () => resolve(formatDate(new Date(file.lastModified)));
      const r = new FileReader();
      r.onload = () => {
        try {
          const buf = r.result;
          if (!buf || buf.byteLength < 20) { fallback(); return; }
          const arr = new Uint8Array(buf);
          const s = String.fromCharCode.apply(null, arr.subarray(0, Math.min(arr.length, 65536)));
          const m = s.match(/(\d{4}):(\d{2}):(\d{2})/);
          if (m) {
            const y = parseInt(m[1], 10);
            if (y >= 1990 && y <= 2030) { resolve(m[1] + '-' + m[2] + '-' + m[3]); return; }
          }
          fallback();
        } catch (e) { fallback(); }
      };
      r.onerror = fallback;
      r.readAsArrayBuffer(file.slice(0, 65536));
    });
  }

  const PERIOD_LENGTH_DAYS = 5;
  let periodDates = [];

  function parsePeriodStartInput(text) {
    const lines = text.trim().split(/\n/).map(s => s.trim()).filter(Boolean);
    const dates = [];
    for (const line of lines) {
      const m = line.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
      if (m) {
        const y = parseInt(m[1], 10), mo = parseInt(m[2], 10), day = parseInt(m[3], 10);
        if (mo >= 1 && mo <= 12 && day >= 1 && day <= 31)
          dates.push(formatDate(new Date(y, mo - 1, day)));
      }
    }
    return dates.sort();
  }

  function projectPeriodDatesFromAnchor(anchorDateStr, avgCycleDays) {
    if (!anchorDateStr || !avgCycleDays) return [];
    const anchor = new Date(anchorDateStr + 'T12:00:00');
    anchor.setHours(0, 0, 0, 0);
    const set = new Set();
    const rangeStart = new Date();
    rangeStart.setMonth(rangeStart.getMonth() - 2);
    rangeStart.setHours(0, 0, 0, 0);
    const rangeEnd = new Date();
    rangeEnd.setMonth(rangeEnd.getMonth() + 6);
    rangeEnd.setHours(23, 59, 59, 999);
    let p = new Date(anchor.getTime());
    while (p.getTime() > rangeStart.getTime()) p.setDate(p.getDate() - avgCycleDays);
    for (; p.getTime() <= rangeEnd.getTime(); p.setDate(p.getDate() + avgCycleDays)) {
      for (let i = 0; i < PERIOD_LENGTH_DAYS; i++) {
        const d = new Date(p);
        d.setDate(d.getDate() + i);
        if (d.getTime() >= rangeStart.getTime() && d.getTime() <= rangeEnd.getTime())
          set.add(formatDate(d));
      }
    }
    return Array.from(set);
  }

  function computePeriodFromInput(startDateStrs) {
    if (startDateStrs.length === 0) return { periodDates: [], avgCycle: 28 };
    const starts = startDateStrs.map(s => new Date(s + 'T12:00:00'));
    starts.forEach(d => d.setHours(0, 0, 0, 0));
    let avgCycleDays = 28;
    if (starts.length >= 2) {
      let totalGap = 0, count = 0;
      for (let i = 1; i < starts.length; i++) {
        totalGap += Math.round((starts[i] - starts[i - 1]) / (24 * 60 * 60 * 1000));
        count++;
      }
      if (count > 0) avgCycleDays = Math.round(totalGap / count);
      if (avgCycleDays < 21) avgCycleDays = 21;
      if (avgCycleDays > 45) avgCycleDays = 45;
    }
    const lastStart = new Date(starts[starts.length - 1].getTime());
    lastStart.setDate(lastStart.getDate() + avgCycleDays);
    const nextStartStr = formatDate(lastStart);
    return { periodDates: projectPeriodDatesFromAnchor(nextStartStr, avgCycleDays), avgCycle: avgCycleDays, anchor: nextStartStr };
  }

  function isPeriodDay(dateStr) { return periodDates.includes(dateStr); }

  function getPeriodStartsInRange(fromDate, toDate) {
    if (!periodAnchorStr || !periodAvgCycle) return [];
    const anchor = new Date(periodAnchorStr + 'T12:00:00');
    anchor.setHours(0, 0, 0, 0);
    const out = [];
    let p = new Date(anchor.getTime());
    while (p.getTime() > fromDate.getTime()) p.setDate(p.getDate() - periodAvgCycle);
    while (p.getTime() <= toDate.getTime()) {
      if (p.getTime() >= fromDate.getTime()) out.push(formatDate(p));
      p.setDate(p.getDate() + periodAvgCycle);
    }
    return out;
  }

  function getPmsAndGoldenDates() {
    const rangeStart = new Date();
    rangeStart.setMonth(rangeStart.getMonth() - 1);
    rangeStart.setHours(0, 0, 0, 0);
    const rangeEnd = new Date();
    rangeEnd.setMonth(rangeEnd.getMonth() + 3);
    rangeEnd.setHours(23, 59, 59, 999);
    const starts = getPeriodStartsInRange(rangeStart, rangeEnd);
    const pmsSet = new Set();
    const goldenSet = new Set();
    starts.forEach(startStr => {
      const start = new Date(startStr + 'T12:00:00');
      for (let i = -5; i <= 2; i++) {
        const d = new Date(start);
        d.setDate(d.getDate() + i);
        if (d >= rangeStart && d <= rangeEnd) pmsSet.add(formatDate(d));
      }
      for (let i = 9; i <= 15; i++) {
        const d = new Date(start);
        d.setDate(d.getDate() + i);
        if (d >= rangeStart && d <= rangeEnd) goldenSet.add(formatDate(d));
      }
    });
    return { pms: Array.from(pmsSet), golden: Array.from(goldenSet) };
  }

  function getNextPmsAndGoldenRanges() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const rangeEnd = new Date();
    rangeEnd.setMonth(rangeEnd.getMonth() + 2);
    const starts = getPeriodStartsInRange(today, rangeEnd);
    if (starts.length === 0) return { pms: null, golden: null };
    const nextStart = new Date(starts[0] + 'T12:00:00');
    const pmsStart = new Date(nextStart);
    pmsStart.setDate(pmsStart.getDate() - 5);
    const pmsEnd = new Date(nextStart);
    pmsEnd.setDate(pmsEnd.getDate() + 2);
    const goldenStart = new Date(nextStart);
    goldenStart.setDate(goldenStart.getDate() + 9);
    const goldenEnd = new Date(nextStart);
    goldenEnd.setDate(goldenEnd.getDate() + 15);
    return {
      pms: { from: formatDate(pmsStart), to: formatDate(pmsEnd) },
      golden: { from: formatDate(goldenStart), to: formatDate(goldenEnd) }
    };
  }

      const sid = (s.id || id());
      if (!s.id) s.id = sid;
      return '<div class="schedule-row metal-engraved chrome-molding p-2 text-[#b0b0b0] text-sm filter drop-shadow content-font flex items-center justify-between gap-2" data-date="' + todayStr + '" data-schedule-id="' + escapeHtml(sid) + '"><span><span class="neon-lime-text font-impact">' + escapeHtml(s.time) + '</span> ' + escapeHtml(s.title) + '</span><span class="flex gap-1"><button type="button" class="schedule-edit-btn flex-shrink-0 px-1.5 py-0.5 rounded metal-magnet chrome-molding text-[10px] leading-none text-black" title="수정">수정</button><button type="button" class="schedule-delete-btn flex-shrink-0 w-6 h-6 rounded metal-magnet chrome-molding text-[10px] leading-none text-black hover:bg-red-500 hover:text-white" title="삭제">×</button></span></div>';
    }).join('');
    list.querySelectorAll('.schedule-delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const row = btn.closest('.schedule-row');
        const dateStr = row.dataset.date;
        const scheduleId = row.dataset.scheduleId;
        const day = remindData[dateStr];
        if (day && day.schedule) {
          day.schedule = day.schedule.filter(x => x.id !== scheduleId);
          save();
          renderAll();
        }
      });
    });
    list.querySelectorAll('.schedule-edit-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const row = btn.closest('.schedule-row');
        const dateStr = row.dataset.date;
        const scheduleId = row.dataset.scheduleId;
        const day = remindData[dateStr];
        const item = day && day.schedule && day.schedule.find(x => x.id === scheduleId);
        if (!item) return;
        const timeVal = escapeHtml(item.time || '');
        const titleVal = escapeHtml(item.title || '');
        row.innerHTML = '<div class="flex flex-col gap-2 w-full"><div class="flex gap-1"><input type="text" class="schedule-edit-time flex-1 min-w-0 metal-engraved chrome-molding px-2 py-1 text-[#b0b0b0] text-xs user-text" value="' + timeVal + '" placeholder="14:00"/><input type="text" class="schedule-edit-title flex-1 min-w-0 metal-engraved chrome-molding px-2 py-1 text-[#b0b0b0] text-xs user-text" value="' + titleVal + '" placeholder="제목"/></div><div class="flex gap-1"><button type="button" class="schedule-save-edit px-2 py-1 rounded neon-lime text-black text-xs font-impact">저장</button><button type="button" class="schedule-cancel-edit px-2 py-1 rounded metal-magnet chrome-molding text-black text-xs">취소</button></div></div>';
        const timeInput = row.querySelector('.schedule-edit-time');
        const titleInput = row.querySelector('.schedule-edit-title');
        row.querySelector('.schedule-save-edit').addEventListener('click', () => {
          const newTime = (timeInput.value || '').trim() || item.time;
          const newTitle = (titleInput.value || '').trim() || item.title;
          item.time = newTime;
          item.title = newTitle;
          save();
          renderAll();
        });
        row.querySelector('.schedule-cancel-edit').addEventListener('click', () => renderAll());
      });
    });
  }

  function renderArchive() {
    const stack = document.getElementById('archiveStack');
    const hintEl = document.getElementById('archiveHint');
    const allDiary = [];
    Object.entries(remindData).forEach(([dateStr, day]) => {
      (day.diary || []).forEach(d => allDiary.push({ ...d, dateStr }));
    });
    allDiary.sort((a,b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    if (allDiary.length === 0) {
      if (hintEl) hintEl.classList.add('hidden');
      stack.innerHTML = '<p class="text-[#C0C0C0] text-center py-12 content-font">Empty stack.</p>';
      return;
    }
    if (hintEl) hintEl.classList.remove('hidden');
    let html = '';
    const cardWidth = 120;
    const cardHeight = 88;
    const stepY = 72;
    const baseLeft = 16;
    allDiary.forEach((d, i) => {
      const did = d.id || id();
      if (!d.id) d.id = did;
      const saved = archivePositions[did];
      const left = saved ? saved.x : baseLeft + (i % 2) * 12;
      const top = saved ? saved.y : 20 + i * stepY;
      const rot = (i % 3) * 4 - 4;
      if (d.imageBase64) {
        html += '<div class="archive-card absolute rounded-lg chrome-molding overflow-hidden bg-white filter drop-shadow content-font cursor-grab active:cursor-grabbing select-none touch-none" data-id="' + escapeHtml(did) + '" style="left:' + left + 'px;top:' + top + 'px;width:' + cardWidth + 'px;transform:rotate(' + rot + 'deg);z-index:1"><img src="' + d.imageBase64 + '" alt="" class="w-full h-28 object-cover pointer-events-none"/><div class="p-1 text-[10px] text-black truncate pointer-events-none">' + escapeHtml((d.content || '').slice(0,20)) + '</div></div>';
      } else {
        html += '<div class="archive-card absolute rounded chrome-molding p-2 metal-plate text-black text-xs overflow-hidden filter drop-shadow content-font cursor-grab active:cursor-grabbing select-none touch-none" data-id="' + escapeHtml(did) + '" style="left:' + left + 'px;top:' + top + 'px;width:100px;min-height:60px;transform:rotate(' + rot + 'deg);z-index:1">' + escapeHtml((d.content || '').slice(0, 50)) + (d.content && d.content.length > 50 ? '…' : '') + '</div>';
      }
    });
    stack.innerHTML = html;
    stack.querySelectorAll('.archive-card').forEach(card => {
      let startX = 0, startY = 0, startLeft = 0, startTop = 0;
      function getPos(e) {
        if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        return { x: e.clientX, y: e.clientY };
      }
      function onStart(e) {
        e.preventDefault();
        const pos = getPos(e);
        startX = pos.x;
        startY = pos.y;
        startLeft = card.offsetLeft;
        startTop = card.offsetTop;
        card.style.zIndex = '10';
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onEnd);
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onEnd);
      }
      function onMove(e) {
        e.preventDefault();
        const pos = getPos(e);
        const dx = pos.x - startX;
        const dy = pos.y - startY;
        card.style.left = (startLeft + dx) + 'px';
        card.style.top = (startTop + dy) + 'px';
      }
      function onEnd() {
        card.style.zIndex = '1';
        const lid = parseInt(card.style.left, 10);
        const tid = parseInt(card.style.top, 10);
        if (!isNaN(lid) && !isNaN(tid)) {
          archivePositions[card.dataset.id] = { x: lid, y: tid };
          saveArchivePositions();
        }
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onEnd);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
      }
      card.addEventListener('mousedown', onStart);
      card.addEventListener('touchstart', onStart, { passive: false });
    });
  }

  function renderMemo() {
    const byTag = {};
    Object.entries(remindData).forEach(([, day]) => {
      (day.diary || []).forEach(d => {
        const tags = extractTags(d.content || '');
        tags.forEach(t => {
          if (!byTag[t]) byTag[t] = [];
          byTag[t].push(d);
        });
      });
    });
    const container = document.getElementById('memoByTag');
    const tags = Object.keys(byTag).sort();
    container.innerHTML = tags.map(tag => '<div class="metal-engraved chrome-molding p-3 filter drop-shadow"><span class="neon-lime-text font-impact">#' + escapeHtml(tag) + '</span><ul class="mt-1 space-y-1 memo-body">' + byTag[tag].map(m => '<li>' + escapeHtml((m.content || '').slice(0,80)) + '</li>').join('') + '</ul></div>').join('') || '<p class="memo-body text-[#C0C0C0] py-8 text-center">No #tags yet.</p>';
  }

  function renderDeco() {
    const container = document.getElementById('decoStickers');
    const tags = Object.entries(remindTags).sort((a,b) => b[1]-a[1]);
    container.innerHTML = tags.map(([tag, count]) => '<span class="sticker-vinyl px-2 py-1 text-xs content-font inline-block filter drop-shadow" style="transform:rotate(' + ((count * 7) % 20 - 10) + 'deg)">#' + escapeHtml(tag) + ' ×' + count + '</span>').join('') || '<p class="text-[#C0C0C0] text-sm content-font">Collect #tags to get stickers.</p>';
  }

  const dateModal = document.getElementById('dateModal');
  const dateModalTitle = document.getElementById('dateModalTitle');
  const dateModalContent = document.getElementById('dateModalContent');
  const dateModalInput = document.getElementById('dateModalInput');
  let selectedDateStr = '';

  function openDateModal(dateStr) {
    selectedDateStr = dateStr;
    const d = new Date(dateStr + 'T12:00:00');
    dateModalTitle.textContent = dateStr + ' — ' + MONTHS[d.getMonth()] + ' ' + d.getDate();
    const day = ensureDate(dateStr);
    let html = '<div class="flex flex-wrap items-center gap-2 mb-2">';
    html += '<button type="button" class="period-set-start-btn py-0.5 px-2 rounded metal-magnet chrome-molding text-[10px] font-impact text-black border border-[#FF0099]">생리 시작일</button>';
    html += '<span class="text-[#C0C0C0] text-[10px] content-font">기분</span>';
    const bw = day.bodyWeather || '';
    [{ v: 'clear', label: '맑음' }, { v: 'cloudy', label: '흐림' }, { v: 'disaster', label: '재앙' }].forEach(({ v, label }) => {
      const active = bw === v;
      html += '<button type="button" class="date-weather-btn py-0.5 px-1.5 rounded text-[10px] content-font border ' + (active ? 'neon-lime text-black border-black' : 'metal-magnet chrome-molding text-[#b0b0b0] border-[#666]') + '" data-weather="' + v + '">' + label + '</button>';
    });
    html += '</div>';
    (day.schedule || []).forEach(s => {
      const sid = s.id || id();
      if (!s.id) s.id = sid;
      html += '<div class="schedule-row metal-engraved chrome-molding p-2 text-[#b0b0b0] text-sm content-font flex items-center justify-between gap-2" data-date="' + selectedDateStr + '" data-schedule-id="' + escapeHtml(sid) + '"><span><span class="neon-lime-text">' + escapeHtml(s.time) + '</span> ' + escapeHtml(s.title) + '</span><span class="flex gap-1"><button type="button" class="schedule-edit-btn flex-shrink-0 px-1.5 py-0.5 rounded metal-magnet chrome-molding text-[10px] leading-none text-black" title="수정">수정</button><button type="button" class="schedule-delete-btn flex-shrink-0 w-6 h-6 rounded metal-magnet chrome-molding text-[10px] leading-none text-black" title="삭제">×</button></span></div>';
    });
    (day.diary || []).forEach(di => {
      if (di.imageBase64) {
        html += '<div class="rounded-lg chrome-molding overflow-hidden bg-white filter drop-shadow content-font"><img src="' + di.imageBase64 + '" alt="" class="w-full max-h-40 object-cover"/><div class="p-2 text-black text-sm">' + escapeHtml(di.content || '') + '</div></div>';
      } else {
        html += '<div class="chrome-molding p-2 metal-plate text-black text-sm filter drop-shadow content-font">' + escapeHtml(di.content || '') + '</div>';
      }
    });
    dateModalContent.innerHTML = html || '<p class="text-[#C0C0C0] text-sm content-font">Nothing this day.</p>';
    const periodSetBtn = dateModalContent.querySelector('.period-set-start-btn');
    if (periodSetBtn) {
      periodSetBtn.addEventListener('click', () => {
        applyPeriodAnchor(selectedDateStr, periodAvgCycle);
        dateModal.classList.add('hidden');
        dateModal.classList.remove('flex');
        renderAll();
      });
    }
    dateModalContent.querySelectorAll('.date-weather-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const weather = btn.dataset.weather;
        const day = ensureDate(selectedDateStr);
        day.bodyWeather = weather;
        save();
        openDateModal(selectedDateStr);
      });
    });
    dateModalContent.querySelectorAll('.schedule-delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const row = btn.closest('.schedule-row');
        const scheduleId = row && row.dataset.scheduleId;
        const day = ensureDate(selectedDateStr);
        if (day.schedule && scheduleId) {
          day.schedule = day.schedule.filter(x => x.id !== scheduleId);
          save();
          openDateModal(selectedDateStr);
        }
      });
    });
    dateModalContent.querySelectorAll('.schedule-edit-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const row = btn.closest('.schedule-row');
        const scheduleId = row.dataset.scheduleId;
        const day = ensureDate(selectedDateStr);
        const item = day.schedule && day.schedule.find(x => x.id === scheduleId);
        if (!item) return;
        const timeVal = escapeHtml(item.time || '');
        const titleVal = escapeHtml(item.title || '');
        row.innerHTML = '<div class="flex flex-col gap-2 w-full"><div class="flex gap-1"><input type="text" class="schedule-edit-time flex-1 min-w-0 metal-engraved chrome-molding px-2 py-1 text-[#b0b0b0] text-xs user-text" value="' + timeVal + '" placeholder="14:00"/><input type="text" class="schedule-edit-title flex-1 min-w-0 metal-engraved chrome-molding px-2 py-1 text-[#b0b0b0] text-xs user-text" value="' + titleVal + '" placeholder="제목"/></div><div class="flex gap-1"><button type="button" class="schedule-save-edit px-2 py-1 rounded neon-lime text-black text-xs font-impact">저장</button><button type="button" class="schedule-cancel-edit px-2 py-1 rounded metal-magnet chrome-molding text-black text-xs">취소</button></div></div>';
        const timeInput = row.querySelector('.schedule-edit-time');
        const titleInput = row.querySelector('.schedule-edit-title');
        row.querySelector('.schedule-save-edit').addEventListener('click', () => {
          item.time = (timeInput.value || '').trim() || item.time;
          item.title = (titleInput.value || '').trim() || item.title;
          save();
          openDateModal(selectedDateStr);
        });
        row.querySelector('.schedule-cancel-edit').addEventListener('click', () => openDateModal(selectedDateStr));
      });
    });
    dateModalInput.value = '';
    dateModal.classList.remove('hidden');
    dateModal.classList.add('flex');
  }
  document.getElementById('dateModalClose').addEventListener('click', () => {
    dateModal.classList.add('hidden');
    dateModal.classList.remove('flex');
  });
  document.getElementById('dateModalSave').addEventListener('click', () => {
    const text = dateModalInput.value.trim();
    if (!text || !selectedDateStr) { dateModal.classList.add('hidden'); dateModal.classList.remove('flex'); return; }
    const day = ensureDate(selectedDateStr);
    day.diary = day.diary || [];
    day.diary.push({ id: id(), content: text, imageBase64: null, createdAt: new Date().toISOString() });
    updateUserStats();
    save();
    dateModal.classList.add('hidden');
    dateModal.classList.remove('flex');
    renderAll();
  });

  function renderAll() {
    updateUserStats();
    renderCalendar();
    renderScheduleList();
    renderArchive();
    renderMemo();
    renderDeco();
  }

  renderAll();
})();
  </script>
</body>
</html>
