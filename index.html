<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RE:MIND - 마음 재활용 센터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: '#F9F9F7',
            ink: '#111827',
            emerald: { DEFAULT: '#059669', light: '#10B981', soft: '#D1FAE5' },
            sky: { DEFAULT: '#0EA5E9', soft: '#E0F2FE' },
          },
          letterSpacing: { stationery: '-0.5px' },
          boxShadow: {
            'soft': '0 2px 8px rgba(0,0,0,0.06)',
            'soft-lg': '0 4px 20px rgba(0,0,0,0.08)',
            'glow': '0 0 24px rgba(5, 150, 105, 0.35)',
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --paper: #F9F9F7;
      --ink: #111827;
      --emerald: #059669;
      --emerald-light: #10B981;
    }
    * { -webkit-tap-highlight-color: transparent; }
    html { overscroll-behavior: none; }
    body {
      background: var(--paper);
      color: var(--ink);
      width: 100%;
      max-width: 450px;
      margin: 0 auto;
      min-height: 100dvh;
      min-height: 100vh;
      letter-spacing: -0.5px;
    }
    @media (min-width: 640px) {
      body {
        max-width: 480px;
        min-height: 640px;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.08);
      }
    }
    @supports (padding: env(safe-area-inset-bottom)) {
      body { padding-bottom: env(safe-area-inset-bottom); }
    }
    .body-weather-period {
      background: repeating-linear-gradient(135deg, rgba(255,182,193,0.2) 0px, rgba(255,182,193,0.2) 8px, transparent 8px, transparent 16px),
        url("data:image/svg+xml,%3Csvg width='20' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 2v4M10 14v4M6 6l2.8 2.8M11.2 11.2L14 14M2 10h4M14 10h4M6 14l2.8-2.8M11.2 8.8L14 6' stroke='%23999' fill='none' stroke-width='.5' opacity='.5'/%3E%3C/svg%3E");
    }
    @keyframes suck-in {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      70% { transform: translate(0, 180px) scale(0.4); opacity: 0.8; }
      100% { transform: translate(0, 200px) scale(0); opacity: 0; }
    }
    @keyframes slide-up {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes bin-rise {
      from { transform: translateY(100%) scale(0.8); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes paper-suck {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      50% { transform: translateY(35dvh) scale(0.5); opacity: 1; }
      100% { transform: translateY(55dvh) scale(0.08); opacity: 0; }
    }
    .animate-suck-in { animation: suck-in 0.55s ease-in forwards; }
    .animate-slide-up { animation: slide-up 0.3s ease-out; }
    .animate-bin-rise { animation: bin-rise 0.5s ease-out forwards; }
    .animate-paper-suck { animation: paper-suck 0.6s ease-in forwards; }
    body.dump-modal-open #tabBar { visibility: hidden; pointer-events: none; }
    .dump-throw-btn { opacity: 0; pointer-events: none; transition: opacity 0.25s ease; }
    .dump-throw-btn.throw-visible { opacity: 1; pointer-events: auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .dump-bin {
      position: relative;
      box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.4);
      transition: box-shadow 0.3s ease, transform 0.2s ease;
    }
    .dump-bin:hover, .dump-bin:focus-visible {
      box-shadow: 0 0 28px rgba(5, 150, 105, 0.4), 0 4px 14px rgba(0,0,0,0.12);
      transform: scale(1.05);
    }
  </style>
</head>
<body class="antialiased pb-28 overscroll-none">
  <!-- Header: Glassmorphism -->
  <header id="header" class="sticky top-0 z-20 bg-transparent backdrop-blur-md">
    <div class="px-4 py-3 sm:px-6 sm:py-4 flex items-center justify-between">
      <h1 class="text-[22px] sm:text-[24px] font-bold text-emerald tracking-stationery">RE:MIND</h1>
      <button type="button" id="bodyWeatherBtn" class="text-xs sm:text-sm font-medium text-sky rounded-full px-3 py-1.5 sm:px-4 sm:py-2 bg-sky/10 shadow-soft hover:bg-sky/15 transition-colors tracking-stationery">오늘의 바디웨더</button>
    </div>
  </header>

  <main class="px-4 py-4 sm:px-6 sm:py-5 min-h-[60vh]">
    <!-- Schedule -->
    <section id="panel-schedule" class="tab-content active">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-[20px] sm:text-[24px] font-bold text-ink tracking-stationery">Calendar</h2>
        <div class="flex gap-2 flex-wrap justify-end">
          <button type="button" data-preset="연차" class="preset-btn text-sm font-medium px-3 py-2 rounded-2xl bg-emerald-soft text-emerald shadow-soft hover:shadow-soft-lg transition-shadow tracking-stationery">연차</button>
          <button type="button" data-preset="노래 수업" class="preset-btn text-sm font-medium px-3 py-2 rounded-2xl bg-emerald-soft text-emerald shadow-soft hover:shadow-soft-lg transition-shadow tracking-stationery">노래 수업</button>
        </div>
      </div>
      <div id="calendarWrap" class="mb-6"></div>
      <div id="scheduleList" class="space-y-1"></div>
    </section>

    <!-- Diary -->
    <section id="panel-diary" class="tab-content">
      <h2 class="text-[20px] sm:text-[24px] font-bold text-ink tracking-stationery mb-5">Archive</h2>
      <div id="diaryList" class="space-y-5"></div>
    </section>

    <!-- The Dump -->
    <section id="panel-dump" class="tab-content">
      <div class="text-center py-16 text-ink/60">
        <p class="text-[18px] font-semibold text-emerald tracking-stationery">아래 쓰레기통 버튼을 눌러</p>
        <p class="text-[15px] mt-1 tracking-stationery">마음을 분리수거해 보세요.</p>
      </div>
    </section>

    <!-- Memo -->
    <section id="panel-memo" class="tab-content">
      <h2 class="text-[20px] sm:text-[24px] font-bold text-ink tracking-stationery mb-5">Memo</h2>
      <div id="memoByTag" class="space-y-5"></div>
    </section>

    <!-- Garden -->
    <section id="panel-garden" class="tab-content">
      <h2 class="text-[20px] sm:text-[24px] font-bold text-ink tracking-stationery mb-5">Garden</h2>
      <div id="gardenGrid" class="grid grid-cols-2 gap-4"></div>
    </section>
  </main>

  <!-- Floating Tab Bar (Pill) -->
  <nav id="tabBar" class="fixed bottom-4 sm:bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-1.5rem)] sm:w-[calc(100%-2rem)] max-w-[420px] z-30 px-2 transition-[visibility] duration-0" style="padding-bottom: max(0.5rem, env(safe-area-inset-bottom));">
    <div class="h-16 rounded-full bg-white/80 backdrop-blur-md shadow-soft-lg flex items-center justify-center gap-0">
      <button type="button" data-tab="schedule" class="tab-btn flex-1 flex flex-col items-center justify-center py-2 text-ink/50 data-[active=true]:text-emerald transition-colors min-h-[4rem]">
        <span class="text-[11px] font-medium tracking-stationery">Calendar</span>
      </button>
      <button type="button" data-tab="diary" class="tab-btn flex-1 flex flex-col items-center justify-center py-2 text-ink/50 data-[active=true]:text-emerald transition-colors min-h-[4rem]">
        <span class="text-[11px] font-medium tracking-stationery">Archive</span>
      </button>
      <button type="button" id="dumpTrigger" class="dump-bin flex-shrink-0 -mt-8 w-[56px] h-[56px] rounded-full bg-emerald flex items-center justify-center text-white flex-shrink-0 p-0" title="분리수거">
        <svg class="w-7 h-7 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
      <button type="button" data-tab="memo" class="tab-btn flex-1 flex flex-col items-center justify-center py-2 text-ink/50 data-[active=true]:text-emerald transition-colors min-h-[4rem]">
        <span class="text-[11px] font-medium tracking-stationery">Memo</span>
      </button>
      <button type="button" data-tab="garden" class="tab-btn flex-1 flex flex-col items-center justify-center py-2 text-ink/50 data-[active=true]:text-emerald transition-colors min-h-[4rem]">
        <span class="text-[11px] font-medium tracking-stationery">Garden</span>
      </button>
    </div>
  </nav>

  <!-- The Dump Modal: Immersive Full-Screen -->
  <div id="dumpModal" class="fixed top-0 bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[450px] sm:max-w-[480px] h-[100dvh] h-[100vh] z-[50] hidden flex-col bg-[#F5F5F5]/98">
    <button type="button" id="dumpModalClose" class="absolute top-5 right-5 z-[52] w-11 h-11 rounded-full bg-ink/10 flex items-center justify-center text-ink text-xl font-bold hover:bg-ink/20 transition-colors" aria-label="닫기">×</button>
    <div class="flex-1 flex flex-col min-h-0 pt-14 px-4 sm:px-6 pb-4">
      <textarea id="dumpText" rows="6" class="flex-1 min-h-[40dvh] w-full p-4 resize-none bg-transparent text-ink text-[17px] placeholder:text-ink/40 outline-none tracking-stationery" placeholder="여기에 맘껏 쏟아내세요...&#10;&#10;#태그, 시간(15:00) 등도 함께 적어도 돼요."></textarea>
      <div id="dumpOptions" class="mt-3 space-y-2 text-sm">
        <div class="flex items-center gap-2">
          <label class="text-ink/60 shrink-0 w-20">날짜·시간</label>
          <input type="datetime-local" id="dumpDateTime" class="flex-1 rounded-xl px-3 py-2 bg-white/80 shadow-soft text-ink outline-none text-sm" />
        </div>
        <div class="flex items-center gap-2">
          <label class="text-ink/60 shrink-0 w-20">반복</label>
          <select id="dumpRecurring" class="flex-1 rounded-xl px-3 py-2 bg-white/80 shadow-soft text-ink outline-none text-sm">
            <option value="">없음</option>
            <option value="weekly">매주</option>
            <option value="monthly">매월</option>
          </select>
        </div>
        <div>
          <label class="text-ink/60 block mb-1">사진 (선택)</label>
          <input type="file" id="dumpImage" accept="image/*" class="w-full text-sm text-ink/60 file:py-2 file:px-3 file:rounded-lg file:bg-white/80 file:text-emerald file:font-medium" />
        </div>
      </div>
    </div>
    <div class="flex-shrink-0 flex flex-col items-center pb-8 pt-2">
      <button type="button" id="dumpSubmit" class="dump-throw-btn w-[calc(100%-2.5rem)] max-w-[320px] py-4 rounded-2xl bg-emerald text-white font-bold text-[16px] shadow-soft-lg hover:bg-emerald-light transition-all tracking-stationery">분리수거 하기 (던지기)</button>
      <div id="dumpBinWrap" class="mt-4 animate-bin-rise w-40 h-40 flex items-center justify-center">
        <svg id="dumpBinSvg" class="w-full h-full drop-shadow-lg" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path fill="#059669" d="M341.511,503.983H167.111c-17.519,0-32.206-13.236-34.021-30.661L93.528,93.528h290.739L341.511,503.983z"/>
          <path fill="#047857" d="M384.267,93.528H93.528l6.235,59.858l33.327,319.936c1.815,17.424,16.502,30.661,34.021,30.661h25.653c-17.519,0-32.206-13.236-34.021-30.661l-32.344-310.5c-0.526-5.046,3.432-9.437,8.505-9.437h243.127L384.267,93.528z"/>
          <path fill="#059669" d="M401.37,127.733H76.426c-9.446,0-17.102-7.656-17.102-17.102V59.324h359.148v51.307C418.472,120.076,410.815,127.733,401.37,127.733z"/>
          <rect x="59.324" y="59.324" fill="#047857" width="359.148" height="17.102"/>
          <path fill="#059669" d="M418.472,59.324H59.324V42.221c0-18.891,15.314-34.205,34.205-34.205h290.739c18.891,0,34.205,15.314,34.205,34.205V59.324z"/>
          <path fill="#10B981" d="M384.267,8.017H93.528c-12.805,0-23.959,7.041-29.822,17.458h350.383C408.227,15.058,397.073,8.017,384.267,8.017z"/>
          <circle fill="#D1FAE5" cx="341.511" cy="461.228" r="42.756"/>
          <circle fill="#6B7280" cx="341.511" cy="461.228" r="17.102"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Paper suck animation (inside modal, so z-[51]) -->
  <div id="suckOverlay" class="fixed top-0 bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[450px] sm:max-w-[480px] h-[100dvh] z-[51] pointer-events-none hidden items-center justify-center">
    <div id="suckCard" class="absolute w-24 h-28 rounded-lg bg-white shadow-soft-lg flex items-center justify-center text-ink/80 text-2xl border border-ink/10" style="top: 25dvh; left: 50%; margin-left: -48px;"></div>
  </div>

  <script>
    (function () {
      const STORAGE_KEYS = {
        schedules: 'remind_schedules',
        diaries: 'remind_diaries',
        memos: 'remind_memos',
        gardenTags: 'remind_garden_tags',
        periodDates: 'remind_period_dates',
      };

      let schedules = JSON.parse(localStorage.getItem(STORAGE_KEYS.schedules) || '[]');
      let diaries = JSON.parse(localStorage.getItem(STORAGE_KEYS.diaries) || '[]');
      let memos = JSON.parse(localStorage.getItem(STORAGE_KEYS.memos) || '[]');
      let gardenTags = JSON.parse(localStorage.getItem(STORAGE_KEYS.gardenTags) || '{}');
      let periodDates = JSON.parse(localStorage.getItem(STORAGE_KEYS.periodDates) || '[]');

      function save() {
        localStorage.setItem(STORAGE_KEYS.schedules, JSON.stringify(schedules));
        localStorage.setItem(STORAGE_KEYS.diaries, JSON.stringify(diaries));
        localStorage.setItem(STORAGE_KEYS.memos, JSON.stringify(memos));
        localStorage.setItem(STORAGE_KEYS.gardenTags, JSON.stringify(gardenTags));
        localStorage.setItem(STORAGE_KEYS.periodDates, JSON.stringify(periodDates));
      }

      function id() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

      function isPeriodDay(dateStr) {
        return periodDates.some(d => d === dateStr);
      }
      function updateBodyWeatherHeader() {
        const today = formatDateOnly(new Date());
        const header = document.getElementById('header');
        const label = document.getElementById('bodyWeatherBtn');
        if (isPeriodDay(today)) {
          header.classList.add('body-weather-period');
          label.textContent = '구름/빗방울';
        } else {
          header.classList.remove('body-weather-period');
          label.textContent = '오늘의 바디웨더';
        }
      }
      document.getElementById('bodyWeatherBtn').addEventListener('click', () => {
        const today = formatDateOnly(new Date());
        const idx = periodDates.indexOf(today);
        if (idx >= 0) periodDates.splice(idx, 1);
        else periodDates.push(today);
        periodDates.sort();
        save();
        updateBodyWeatherHeader();
      });
      function formatDateOnly(d) {
        const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
      }
      function parseTimeFromText(text) {
        const m = text.match(/(\d{1,2}):(\d{2})/);
        return m ? { hours: parseInt(m[1], 10), minutes: parseInt(m[2], 10) } : null;
      }
      function extractTags(text) {
        const matches = text.match(/#[\w가-힣]+/g) || [];
        return [...new Set(matches.map(t => t.slice(1)))];
      }

      let currentTab = 'schedule';
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentTab = btn.dataset.tab;
          document.querySelectorAll('.tab-btn').forEach(b => b.dataset.active = b.dataset.tab === currentTab ? 'true' : 'false');
          document.querySelectorAll('.tab-content').forEach(p => { p.classList.toggle('active', p.id === 'panel-' + currentTab); });
          renderAll();
        });
      });
      document.querySelector('[data-tab="schedule"]').dataset.active = 'true';

      const dumpModal = document.getElementById('dumpModal');
      const dumpTrigger = document.getElementById('dumpTrigger');
      const dumpSubmit = document.getElementById('dumpSubmit');
      const dumpText = document.getElementById('dumpText');
      const dumpDateTime = document.getElementById('dumpDateTime');
      const dumpRecurring = document.getElementById('dumpRecurring');
      const dumpImage = document.getElementById('dumpImage');
      const suckOverlay = document.getElementById('suckOverlay');

      function openDumpModal() {
        document.body.classList.add('dump-modal-open');
        dumpModal.classList.remove('hidden');
        dumpModal.classList.add('flex');
        dumpText.value = '';
        dumpDateTime.value = '';
        dumpRecurring.value = '';
        dumpImage.value = '';
        dumpSubmit.classList.remove('throw-visible');
        dumpBinWrap.classList.remove('animate-bin-rise');
        void dumpBinWrap.offsetWidth;
        dumpBinWrap.classList.add('animate-bin-rise');
      }
      function closeDumpModal() {
        document.body.classList.remove('dump-modal-open');
        dumpModal.classList.add('hidden');
        dumpModal.classList.remove('flex');
      }
      dumpTrigger.addEventListener('click', openDumpModal);
      document.getElementById('dumpModalClose').addEventListener('click', closeDumpModal);
      dumpText.addEventListener('input', () => {
        dumpSubmit.classList.toggle('throw-visible', dumpText.value.trim().length > 0);
      });

      function playSuckAnimation(callback) {
        const card = document.getElementById('suckCard');
        card.textContent = '📄';
        card.className = 'absolute w-24 h-28 rounded-lg bg-white shadow-soft-lg flex items-center justify-center text-ink/80 text-2xl border border-ink/10 animate-paper-suck';
        card.style.cssText = 'top: 20dvh; left: 50%; margin-left: -48px;';
        suckOverlay.classList.remove('hidden');
        suckOverlay.classList.add('flex');
        setTimeout(() => {
          card.className = 'absolute w-24 h-28 rounded-lg bg-white shadow-soft-lg flex items-center justify-center text-ink/80 text-2xl border border-ink/10';
          card.textContent = '';
          card.style.cssText = '';
          suckOverlay.classList.add('hidden');
          suckOverlay.classList.remove('flex');
          if (callback) callback();
        }, 650);
      }

      dumpSubmit.addEventListener('click', async () => {
        const text = dumpText.value.trim();
        const dateTimeVal = dumpDateTime.value;
        const recurring = dumpRecurring.value;
        const tags = extractTags(text);
        const timeInText = parseTimeFromText(text);
        const hasLongText = text.length > 80;
        let imageBase64 = null;
        if (dumpImage.files && dumpImage.files[0]) {
          imageBase64 = await new Promise((res) => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.readAsDataURL(dumpImage.files[0]);
          });
        }
        const hasPhoto = !!imageBase64;

        const dateForSchedule = dateTimeVal ? new Date(dateTimeVal) : new Date();
        const dateStr = formatDateOnly(dateForSchedule);
        const timeStr = dateTimeVal ? dateTimeVal.slice(11, 16) : (timeInText ? `${String(timeInText.hours).padStart(2,'0')}:${String(timeInText.minutes).padStart(2,'0')}` : null);

        if (dateStr && (timeStr || recurring)) {
          const title = text.replace(/#[\w가-힣]+/g, '').replace(/\d{1,2}:\d{2}/g, '').trim() || 'Schedule';
          schedules.push({
            id: id(),
            title,
            date: dateStr,
            time: timeStr || null,
            recurring: recurring || null,
            preset: null,
            createdAt: new Date().toISOString(),
          });
          if (recurring === 'weekly' || recurring === 'monthly') {
            const base = new Date(dateForSchedule);
            for (let i = 1; i <= 12; i++) {
              const next = new Date(base);
              if (recurring === 'weekly') next.setDate(next.getDate() + 7 * i);
              else next.setMonth(next.getMonth() + i);
              schedules.push({
                id: id(),
                title,
                date: formatDateOnly(next),
                time: timeStr,
                recurring,
                preset: null,
                createdAt: new Date().toISOString(),
              });
            }
          }
        }
        if (hasPhoto || hasLongText) {
          diaries.push({
            id: id(),
            content: text,
            imageBase64: imageBase64 || null,
            createdAt: new Date().toISOString(),
          });
        }
        if (tags.length) {
          memos.push({ id: id(), content: text, tags, createdAt: new Date().toISOString() });
          tags.forEach(t => { gardenTags[t] = (gardenTags[t] || 0) + 1; });
        }
        save();
        playSuckAnimation(() => {
          closeDumpModal();
          renderAll();
        });
      });

      document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const title = btn.dataset.preset;
          const today = formatDateOnly(new Date());
          schedules.push({ id: id(), title, date: today, time: null, recurring: null, preset: title, createdAt: new Date().toISOString() });
          save();
          renderAll();
        });
      });

      const WEEKDAYS = ['월','화','수','목','금','토','일'];
      const SAT = 6, SUN = 0;
      function getMonthDays(year, month) {
        const first = new Date(year, month, 1);
        const last = new Date(year, month + 1, 0);
        const startDow = first.getDay();
        const monStart = startDow === 0 ? 6 : startDow - 1;
        const days = [];
        for (let i = 0; i < monStart; i++) days.push(null);
        for (let d = 1; d <= last.getDate(); d++) days.push(d);
        return days;
      }
      function getDayOfWeek(year, month, day) {
        return new Date(year, month, day - 1).getDay();
      }

      function renderCalendar() {
        const now = new Date();
        const year = now.getFullYear(), month = now.getMonth();
        const todayStr = formatDateOnly(now);
        const wrap = document.getElementById('calendarWrap');
        const days = getMonthDays(year, month);
        const monthLabel = `${year}년 ${month + 1}월`;
        let html = '<div class="flex justify-between items-center mb-4"><span class="text-[18px] font-bold text-ink tracking-stationery">' + monthLabel + '</span></div>';
        html += '<div class="grid grid-cols-7 gap-0 text-center text-[12px] font-semibold text-ink/60 tracking-stationery mb-3">';
        WEEKDAYS.forEach((w) => {
          const dayColor = w === '토' ? 'text-sky' : w === '일' ? 'text-red-400' : '';
          html += '<div class="py-1.5 ' + dayColor + '">' + w + '</div>';
        });
        html += '</div><div class="grid grid-cols-7 gap-1 text-center">';
        days.forEach((d) => {
          if (d === null) { html += '<div class="aspect-square"></div>'; return; }
          const dow = getDayOfWeek(year, month, d);
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const isSat = dow === SAT, isSun = dow === SUN;
          const dayColor = isSun ? 'text-red-400' : isSat ? 'text-sky' : 'text-ink';
          const isToday = dateStr === todayStr;
          const periodClass = isPeriodDay(dateStr) ? ' body-weather-period' : '';
          const count = schedules.filter(s => s.date === dateStr).length;
          const circleClass = isToday ? ' rounded-full bg-emerald text-white font-bold' : '';
          const dotHtml = count ? '<span class="absolute bottom-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-emerald-light"></span>' : '';
          html += '<div class="relative aspect-square flex items-center justify-center text-[15px] font-bold ' + dayColor + periodClass + circleClass + '" data-date="' + dateStr + '">' + d + dotHtml + '</div>';
        });
        html += '</div>';
        wrap.innerHTML = html;
      }

      function renderScheduleList() {
        const list = document.getElementById('scheduleList');
        const today = formatDateOnly(new Date());
        const relevant = schedules.filter(s => s.date >= today).sort((a, b) => a.date.localeCompare(b.date) || (a.time || '').localeCompare(b.time || ''));
        list.innerHTML = relevant.slice(0, 30).map(s =>
          '<div class="flex items-center gap-3 py-3 px-4 rounded-2xl bg-white shadow-soft"><span class="text-sm font-bold text-emerald shrink-0">' + s.date + (s.time ? ' ' + s.time : '') + '</span><span class="text-ink font-medium truncate">' + escapeHtml(s.title) + '</span></div>'
        ).join('') || '<p class="text-ink/50 text-[15px] font-medium py-8 text-center tracking-stationery">No schedules yet.</p>';
      }

      function renderDiary() {
        const list = document.getElementById('diaryList');
        const sorted = [...diaries].sort((a, b) => b.createdAt.localeCompare(a.createdAt));
        list.innerHTML = sorted.map(d => {
          const date = new Date(d.createdAt);
          const dateStr = date.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
          let block = '<div class="rounded-3xl p-5 bg-white shadow-soft"><div class="text-[13px] font-medium text-ink/50 mb-3 tracking-stationery">' + dateStr + '</div>';
          if (d.imageBase64) block += '<img src="' + d.imageBase64 + '" alt="" class="w-full rounded-2xl mb-4 max-h-52 object-cover shadow-soft" />';
          block += '<p class="text-ink leading-relaxed whitespace-pre-wrap text-[15px] tracking-stationery">' + escapeHtml(d.content || '') + '</p></div>';
          return block;
        }).join('') || '<p class="text-ink/50 text-[15px] font-medium py-8 text-center tracking-stationery">No entries yet.</p>';
      }

      function renderMemo() {
        const byTag = {};
        memos.forEach(m => {
          m.tags.forEach(t => {
            if (!byTag[t]) byTag[t] = [];
            byTag[t].push(m);
          });
        });
        const container = document.getElementById('memoByTag');
        const tags = Object.keys(byTag).sort();
        container.innerHTML = tags.map(tag =>
          '<div class="rounded-3xl p-5 bg-white shadow-soft"><h4 class="text-emerald font-bold text-[16px] mb-3 tracking-stationery">#' + escapeHtml(tag) + '</h4><ul class="space-y-2">' +
          byTag[tag].map(m => '<li class="text-ink/80 text-[15px] leading-relaxed">' + escapeHtml(m.content.slice(0, 120) + (m.content.length > 120 ? '…' : '')) + '</li>').join('') +
          '</ul></div>'
        ).join('') || '<p class="text-ink/50 text-[15px] font-medium py-8 text-center tracking-stationery">No tagged memos yet.</p>';
      }

      function growthStage(count) {
        if (count >= 10) return 4;
        if (count >= 5) return 3;
        if (count >= 2) return 2;
        return 1;
      }
      const COSMOS = ['🌱','🌿','🌻','🌸'];
      const LILY = ['🌱','🍃','💐','✨'];
      function renderGarden() {
        const grid = document.getElementById('gardenGrid');
        const entries = Object.entries(gardenTags).map(([tag, count]) => ({ tag, count, stage: growthStage(count) }));
        entries.sort((a, b) => b.count - a.count);
        grid.innerHTML = entries.map(({ tag, count, stage }) => {
          const useCosmos = tag.length % 2 === 0;
          const icons = useCosmos ? COSMOS : LILY;
          const name = useCosmos ? '코스모스' : '은방울꽃';
          return '<div class="rounded-3xl p-5 bg-white shadow-soft text-center"><div class="text-[32px] mb-2">' + icons[stage - 1] + '</div><div class="text-emerald font-bold text-[15px] tracking-stationery">#' + escapeHtml(tag) + '</div><div class="text-[12px] text-ink/50 mt-0.5">' + name + ' ' + stage + '단계 · ' + count + '개</div></div>';
        }).join('') || '<p class="text-ink/50 text-[15px] font-medium py-8 text-center col-span-2 tracking-stationery">Collect tags to grow flowers.</p>';
      }

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function renderAll() {
        updateBodyWeatherHeader();
        renderCalendar();
        renderScheduleList();
        renderDiary();
        renderMemo();
        renderGarden();
      }

      renderAll();
    })();
  </script>
</body>
</html>
